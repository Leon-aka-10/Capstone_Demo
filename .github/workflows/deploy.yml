# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
##############################################################################
# .github/workflows/deploy.yml
# Full CI/CD pipeline for Zuri Market
#
# Triggers on push to main.
# Stages: test → security scan → build → push → terraform → deploy
##############################################################################

name: Zuri Market CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test Backend
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: "Test Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: npm audit (dependency vulnerability check)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Test Frontend
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: "Test Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present -- --watchAll=false

      - name: npm audit (dependency vulnerability check)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Secret Leak Detection
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Secret Leak Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Terraform Scan
  # ─────────────────────────────────────────────────────────────────────────
  terraform-scan:
    name: "Terraform Security Scan (tfsec)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: false

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Build & Push Docker Images
  # (only on push to main, after tests pass)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, secret-scan, terraform-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ───────────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-frontend:latest
          # Vite bakes env vars at BUILD TIME — pass the backend URL here
          # In the frontend code use: import.meta.env.VITE_API_URL
          build-args: |
            VITE_API_URL=http://${{ secrets.VM_PUBLIC_IP }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: scan backend image for vulnerabilities ────────────────────
      - name: Trivy scan – backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-backend:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # ── Trivy: scan frontend image ───────────────────────────────────────
      - name: Trivy scan – frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/zurimarket-frontend:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 6 — Terraform Apply (provision / update Azure infrastructure)
  # ─────────────────────────────────────────────────────────────────────────
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 7 — Deploy to Kubernetes (k3s)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [terraform]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace (idempotent)
        run: kubectl apply -f k8s/secret-provider-class.yaml

      - name: Deploy SecretProviderClass
        run: |
          # Inject real values from Terraform outputs
          sed -i "s/REPLACE_WITH_MANAGED_IDENTITY_CLIENT_ID/${{ secrets.MANAGED_IDENTITY_CLIENT_ID }}/g" k8s/secret-provider-class.yaml
          sed -i "s/REPLACE_WITH_KEY_VAULT_NAME/${{ secrets.KEY_VAULT_NAME }}/g" k8s/secret-provider-class.yaml
          sed -i "s/REPLACE_WITH_TENANT_ID/${{ secrets.AZURE_TENANT_ID }}/g" k8s/secret-provider-class.yaml
          kubectl apply -f k8s/secret-provider-class.yaml

      - name: Deploy backend
        run: |
          sed -i "s|DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/backend-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-deployment.yaml

      - name: Deploy frontend
        run: |
          sed -i "s|DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/frontend-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml

      - name: Apply Ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/zurimarket-backend -n zurimarket --timeout=120s
          kubectl rollout status deployment/zurimarket-frontend -n zurimarket --timeout=120s

      - name: Show running pods
        run: kubectl get pods -n zurimarket
