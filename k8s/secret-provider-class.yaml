##############################################################################
# k8s/secret-provider-class.yaml
# Tells the CSI driver how to fetch secrets from Azure Key Vault
# and sync them as a native Kubernetes Secret (zurimarket-secrets)
##############################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: zurimarket-keyvault
  namespace: zurimarket
spec:
  provider: azure
  secretObjects:
    # This creates a native K8s Secret that pods can reference
    - secretName: zurimarket-secrets
      type: Opaque
      data:
        - objectName: STRIPE-SECRET-KEY
          key: STRIPE-SECRET-KEY
        - objectName: DATABASE-URL
          key: DATABASE-URL
        - objectName: JWT-SECRET
          key: JWT-SECRET
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Replace with the output from: terraform output managed_identity_client_id
    userAssignedIdentityID: "REPLACE_WITH_MANAGED_IDENTITY_CLIENT_ID"
    # Replace with: terraform output key_vault_name
    keyvaultName: "REPLACE_WITH_KEY_VAULT_NAME"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: STRIPE-SECRET-KEY
          objectType: secret
        - |
          objectName: DATABASE-URL
          objectType: secret
        - |
          objectName: JWT-SECRET
          objectType: secret
    # Replace with your Azure Tenant ID
    tenantId: "REPLACE_WITH_TENANT_ID"

---
##############################################################################
# k8s/namespace.yaml
# Dedicated namespace for all Zuri Market resources
##############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: zurimarket

---
##############################################################################
# Service Account (used by pods to authenticate with Azure via managed identity)
##############################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zurimarket-sa
  namespace: zurimarket
